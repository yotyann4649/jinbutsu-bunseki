<!-- 検索エンジンに「正しいURLはこちら」と伝え、旧URLの評価を新URLへ引き継ぐ -->

<style>
  body{

  <!-- 転送が一瞬遅れた場合や、上の仕組みが全て効かない場合のための手動リンク -->
